name: Deploy - Produção

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  deploy:
    name: 🚀 Deploy para Netlify
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📚 Instalar dependências
        run: npm install

      - name: 🧪 Executar testes
        run: npm run test:run

      - name: 📁 Preparar pasta de build
        run: mkdir -p build-optimized

      - name: 🏗️ Build otimizado
        run: npm run build
        env:
          NODE_ENV: production

      - name: 🚀 Deploy para Netlify
        run: npx --yes netlify-cli deploy --prod --dir=. --site ${{ secrets.NETLIFY_SITE_ID }} --auth ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: 📢 Notificar sucesso
        if: success()
        run: |
          echo "✅ Deploy realizado com sucesso!"
          echo "🌐 URL: https://siav.netlify.app"
